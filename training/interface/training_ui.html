<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NPK Soil Segment - Training Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap" />
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ededed;--card:#fff;--panel:#f4f6fb;--border:#e1e6f0;--border-strong:#cfd7e6;
  --text:#2a3446;--muted:#7b8799;--navy:#2a4d73;--navy-strong:#1f2a3d;--orange:#f28c28;
  --green:#22c55e;--red:#ef4444;--shadow:0 12px 24px rgba(22,32,52,.1);
  --radius:10px;--radius-lg:14px;
  --font-sans:"Google Sans","Segoe UI",system-ui,-apple-system,sans-serif;
  --font-mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font:14px var(--font-sans)}
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:236px;flex-shrink:0;display:flex;flex-direction:column;background:#f6f7fb;border-right:1px solid var(--border)}
.sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-main{color:var(--navy);font-size:13px;font-weight:700;letter-spacing:.06em}
.logo-sub{margin-top:4px;color:var(--muted);font-size:11px}
.nav-section{padding:14px 10px 8px}
.nav-label{padding:0 8px;margin-bottom:4px;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--radius);color:#66748a;font-size:13px;font-weight:500;cursor:pointer;transition:background .14s ease,color .14s ease}
.nav-item:hover{background:rgba(242,140,40,.08);color:var(--navy)}
.nav-item.active{background:rgba(242,140,40,.14);color:var(--navy-strong)}
.nav-item.active-secondary{background:rgba(42,77,115,.1);color:var(--navy-strong)}
.nav-icon{width:16px;height:16px;opacity:.8;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:12px 10px 16px;border-top:1px solid var(--border)}
.status-pill{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--radius);font:12px var(--font-mono)}
.status-pill.idle{background:var(--panel);color:var(--muted)}
.status-pill.running{background:rgba(34,197,94,.12);color:var(--green)}
.status-pill.running-reg{background:rgba(42,77,115,.12);color:var(--navy)}
.status-pill.error{background:rgba(239,68,68,.12);color:var(--red)}
.pulse{width:8px;height:8px;border-radius:50%;background:currentColor}
.pulse.anim{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.45;transform:scale(.85)}}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;display:flex;align-items:center;gap:14px;padding:0 28px;border-bottom:1px solid var(--border);background:#f7f8fb}
.topbar-title{color:var(--navy);font-size:15px;font-weight:600}
.topbar-sub{color:var(--muted);font:12px var(--font-mono)}
.topbar-spacer{flex:1}
.topbar-badge{padding:4px 10px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--muted);font:11px var(--font-mono)}
.content{flex:1;overflow-y:auto;padding:24px 28px 32px}
.card{margin-bottom:16px;padding:20px 22px;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow)}
.card-title{margin-bottom:14px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.form-grid,.upload-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
.upload-grid{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{color:#617088;font-size:11px;font-weight:600;letter-spacing:.04em}
.form-input,.form-select{width:100%;padding:9px 11px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--panel);color:var(--text);font:13px var(--font-mono);outline:none;transition:border-color .15s ease,box-shadow .15s ease}
.form-input:focus,.form-select:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(242,140,40,.12)}
.form-input.alt:focus,.form-select.alt:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(42,77,115,.1)}
.form-hint{color:var(--muted);font-size:11px}
.toggle-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.toggle-label{color:#55657c;font-size:13px}
.toggle{position:relative;width:38px;height:22px;cursor:pointer}
.toggle input{position:absolute;opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;border-radius:999px;border:1px solid var(--border-strong);background:#dbe2ef;transition:background .2s ease,border-color .2s ease}
.toggle-thumb{position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.16);transition:transform .2s ease}
.toggle input:checked~.toggle-track{border-color:var(--orange);background:var(--orange)}
.toggle input:checked~.toggle-thumb{transform:translateX(16px)}
.btn-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:var(--radius);padding:9px 16px;font:600 13px var(--font-sans);cursor:pointer;transition:transform .12s ease,filter .12s ease,background .12s ease,color .12s ease}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-primary{background:var(--orange);color:#fff}.btn-secondary{background:var(--navy);color:#fff}
.btn-primary:hover:not(:disabled),.btn-secondary:hover:not(:disabled){filter:brightness(1.05)}
.btn-danger{border:1px solid rgba(239,68,68,.18);background:rgba(239,68,68,.12);color:var(--red)}
.btn-danger:hover:not(:disabled){background:rgba(239,68,68,.16)}
.btn-ghost{border:1px solid var(--border);background:var(--card);color:#5f6d82}
.btn-ghost:hover:not(:disabled){background:var(--panel);color:var(--navy)}
.dataset-toolbar{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.dataset-actions,.dataset-chip-row{display:flex;gap:8px;flex-wrap:wrap}
.dataset-root{margin-bottom:14px;color:var(--muted);font:11px var(--font-mono)}
.dataset-list{display:grid;gap:10px}
.dataset-row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:14px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--panel)}
.dataset-row-main{display:flex;gap:12px;flex:1;min-width:0}
.dataset-row input[type="checkbox"]{width:16px;height:16px;margin-top:2px;accent-color:var(--orange)}
.dataset-name{color:var(--navy);font-size:14px;font-weight:600}
.dataset-path{margin-top:6px;color:var(--muted);font:11px var(--font-mono);word-break:break-all}
.dataset-metrics{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
.dataset-pill{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:var(--card);color:var(--muted);font:12px var(--font-mono)}
.dataset-pill span{color:var(--text);font-weight:600;margin-left:6px}
.dataset-status{display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font:11px var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
.dataset-status.ready{background:rgba(34,197,94,.12);color:var(--green)}
.dataset-status.incomplete{background:rgba(239,68,68,.1);color:var(--red)}
.selection-panel{margin-bottom:16px;padding:14px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--panel)}
.selection-label{color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.selection-copy{margin-top:6px;color:#55657c;font-size:13px}
.dataset-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(42,77,115,.08);border:1px solid rgba(42,77,115,.14);color:var(--navy);font-size:12px;font-weight:600}
.dropzone{position:relative;padding:36px 20px;text-align:center;border-radius:var(--radius-lg);border:1.5px dashed var(--border-strong);background:linear-gradient(180deg,rgba(242,140,40,.02),rgba(42,77,115,.03));cursor:pointer;transition:border-color .14s ease,background .14s ease}
.dropzone:hover,.dropzone.drag-over{border-color:var(--orange);background:rgba(242,140,40,.08)}
.dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-icon{margin-bottom:10px;color:var(--muted)}
.drop-title{margin-bottom:4px;color:var(--navy-strong);font-size:13px;font-weight:600}
.drop-sub{color:var(--muted);font-size:11px}
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.chart-wrap{position:relative;margin-bottom:14px;padding:16px;border-radius:var(--radius-lg);border:1px solid var(--border);background:var(--panel)}
.chart-wrap canvas{max-height:280px}
.chart-title{margin-bottom:12px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.chart-empty{height:200px;display:flex;align-items:center;justify-content:center;color:var(--muted);font:13px var(--font-mono)}
.metric-badges{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.metric-badge{padding:6px 12px;border-radius:999px;font:12px var(--font-mono)}
.metric-badge.train-loss{background:rgba(42,77,115,.1);color:var(--navy)}
.metric-badge.val-loss{background:rgba(239,68,68,.1);color:var(--red)}
.metric-badge.train-dice{background:rgba(34,197,94,.12);color:var(--green)}
.metric-badge.val-dice{background:rgba(242,140,40,.14);color:var(--orange)}
.progress-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.progress-pill{padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow)}
.progress-pill-label{color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.progress-pill-value{margin-top:6px;color:var(--navy);font-size:14px;font-weight:600}
.log-box{height:200px;overflow-y:auto;padding:12px 14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--panel);color:#4f5e75;font:11.5px var(--font-mono);line-height:1.7}
.log-line{white-space:pre-wrap;word-break:break-word}
.log-line.done{color:var(--green);font-weight:600}.log-line.warn{color:#d99017}.log-line.err{color:var(--red)}
.log-line.fold{color:var(--orange);font-weight:600}.log-line.meta{color:var(--navy)}
.toast-container{position:fixed;right:24px;bottom:20px;display:flex;flex-direction:column;gap:8px;z-index:999}
.toast{min-width:220px;padding:10px 16px;border-radius:var(--radius);border:1px solid transparent;font-size:13px;animation:toast-in .2s ease}
.toast.success{border-color:rgba(34,197,94,.2);background:rgba(34,197,94,.12);color:var(--green)}
.toast.error{border-color:rgba(239,68,68,.18);background:rgba(239,68,68,.12);color:var(--red)}
.toast.info{border-color:var(--border);background:var(--card);color:var(--muted)}
@keyframes toast-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.section-divider{height:1px;margin:18px 0;background:var(--border)}
@media (max-width:900px){.sidebar{width:210px}.dataset-row{flex-direction:column}.dataset-metrics{justify-content:flex-start}}
</style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-main">SOIL-SEGMENT</div>
      <div class="logo-sub">NPK Training Interface</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Data</div>
      <div class="nav-item" :class="{ active: tab === 'dataset' }" @click="tab='dataset'">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="8" cy="4" rx="6" ry="2"/><path d="M2 4v4c0 1.1 2.7 2 6 2s6-.9 6-2V4"/><path d="M2 8v4c0 1.1 2.7 2 6 2s6-.9 6-2V8"/></svg>
        Dataset
      </div>
      <div class="nav-item" :class="{ active: tab === 'upload' }" @click="tab='upload'">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 10V3M5 6l3-3 3 3"/><path d="M3 12h10"/></svg>
        Upload files
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Training</div>
      <div class="nav-item" :class="{ active: tab === 'unet' }" @click="tab='unet'">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="6" width="4" height="4" rx="1"/><rect x="11" y="6" width="4" height="4" rx="1"/><rect x="6" y="1" width="4" height="4" rx="1"/><rect x="6" y="11" width="4" height="4" rx="1"/><path d="M5 8h6M8 5v6"/></svg>
        UNet model
      </div>
      <div class="nav-item" :class="{ 'active-secondary': tab === 'regression' }" @click="tab='regression'">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12 L5 8 L8 9 L11 5 L14 3"/><circle cx="5" cy="8" r="1.5" fill="currentColor" stroke="none"/><circle cx="8" cy="9" r="1.5" fill="currentColor" stroke="none"/></svg>
        Regression
      </div>
    </div>
    <div class="nav-section">
      <div class="nav-label">Monitor</div>
      <div class="nav-item" :class="{ active: tab === 'progress' }" @click="tab='progress'">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 12 L5 7 L9 9 L13 3"/><path d="M2 14h12"/></svg>
        Training progress
      </div>
    </div>
    <div class="sidebar-bottom">
      <div class="status-pill" :class="{ running: status.running && status.mode !== 'regression', 'running-reg': status.running && status.mode === 'regression', error: !!status.error, idle: !status.running && !status.error }">
        <span class="pulse" :class="{ anim: status.running }"></span>
        <span v-if="status.running && status.mode === 'unet'">training unet</span>
        <span v-else-if="status.running && status.mode === 'unet_uncoated'">unet loo-cv</span>
        <span v-else-if="status.running && status.mode === 'regression'">training regression</span>
        <span v-else-if="status.error">error</span>
        <span v-else>idle</span>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span class="topbar-title">{{ tabTitle }}</span>
      <span class="topbar-sub">{{ tabSub }}</span>
      <span class="topbar-spacer"></span>
      <span class="topbar-badge">{{ serverUrl }}</span>
    </div>

    <div class="content">
      <template v-if="tab === 'dataset'">
        <div class="card">
          <div class="dataset-toolbar">
            <div>
              <div class="card-title" style="margin-bottom:6px;">Dataset overview</div>
              <div style="font-size:13px;color:#55657c;">{{ selectedDatasets.length }} selected for UNet training</div>
            </div>
            <div class="dataset-actions" v-if="dsInfo">
              <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;" @click="selectAllDatasets">Select all</button>
              <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;" @click="selectCoatedDatasets">Coated</button>
              <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;" @click="selectUncoatedDatasets">Uncoated</button>
              <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;" @click="clearDatasetSelection">Clear</button>
            </div>
          </div>
          <template v-if="dsInfo">
            <div class="dataset-root">{{ dsInfo.unet_root }}</div>
            <div class="dataset-list">
              <label v-for="ds in availableDatasets" :key="ds.name" class="dataset-row">
                <div class="dataset-row-main">
                  <input type="checkbox" v-model="selectedDatasets" :value="ds.name" :disabled="!ds.trainable" />
                  <div>
                    <div class="dataset-name">{{ ds.name }}</div>
                    <div class="dataset-path">{{ ds.base }}</div>
                  </div>
                </div>
                <div class="dataset-metrics">
                  <span class="dataset-pill">images<span>{{ ds.images }}</span></span>
                  <span class="dataset-pill">masks<span>{{ ds.masks }}</span></span>
                  <span class="dataset-status" :class="ds.trainable ? 'ready' : 'incomplete'">{{ ds.trainable ? 'ready' : 'incomplete' }}</span>
                </div>
              </label>
            </div>
          </template>
          <div v-else style="color:var(--muted);font-size:13px;padding:10px 0;">Loading dataset info...</div>
        </div>

        <div class="card" v-if="dsInfo">
          <div class="card-title">Checkpoints</div>
          <div v-if="dsInfo.checkpoints.files.length === 0" style="color:var(--muted);font-size:13px;">No checkpoint files found.</div>
          <div v-else class="dataset-chip-row">
            <span v-for="f in dsInfo.checkpoints.files" :key="f" class="dataset-chip">{{ f }}</span>
          </div>
        </div>

        <div class="btn-row" style="margin-top:4px;">
          <button class="btn btn-ghost" @click="loadDatasetInfo">Refresh</button>
        </div>
      </template>

      <template v-if="tab === 'upload'">
        <div class="card">
          <div class="card-title">Upload options</div>
          <div class="upload-grid">
            <div class="form-group">
              <label class="form-label">Target storage</label>
              <select v-model="uploadForm.dataset_type" class="form-select">
                <option value="unet">UNet dataset</option>
                <option value="regression">Regression dataset</option>
              </select>
            </div>
            <div class="form-group" v-if="!isRegressionUpload">
              <label class="form-label">File type</label>
              <select v-model="uploadForm.file_role" class="form-select">
                <option value="images">Images</option>
                <option value="masks">Masks</option>
              </select>
              <span class="form-hint">Zip uploads should contain images/ and masks/ folders.</span>
            </div>
            <div class="form-group">
              <label class="form-label">Dataset folder</label>
              <template v-if="!useCustomDataset">
                <select v-model="uploadForm.existing_dataset_name" class="form-select">
                  <option v-for="name in availableUploadDatasetNames" :key="name" :value="name">{{ name }}</option>
                </select>
              </template>
              <template v-else>
                <input v-model="uploadForm.custom_dataset_name" type="text" class="form-input" placeholder="Type a new dataset name" />
              </template>
              <div class="btn-row" style="margin-top:0;">
                <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;" @click="useExistingDataset">Use existing</button>
                <button class="btn btn-ghost" style="padding:6px 10px;font-size:11px;" @click="enterCustomDataset">New dataset</button>
              </div>
              <span class="form-hint">{{ isRegressionUpload ? 'Uploads are stored directly inside the chosen formula folder.' : 'UNet uploads are stored under dataset/images or dataset/masks.' }}</span>
            </div>
          </div>

          <div class="dropzone" :class="{ 'drag-over': dragging }" @dragover.prevent="dragging=true" @dragleave.prevent="dragging=false" @drop.prevent="onDrop($event)">
            <input type="file" multiple :accept="uploadAccept" @change="onFileSelect($event)" />
            <div class="drop-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <div class="drop-title">Drop files here or click to browse</div>
            <div class="drop-sub">{{ isRegressionUpload ? 'Supports image files or a zip archive.' : 'Supports image or mask files, or a zip archive with images/ and masks/.' }}</div>
          </div>

          <div v-if="uploadFiles.length > 0" style="margin-top:14px;">
            <div style="font-size:11px;color:var(--muted);margin-bottom:8px;">{{ uploadFiles.length }} file(s) selected</div>
            <div class="dataset-chip-row" style="margin-top:0;margin-bottom:14px;">
              <span v-for="f in uploadFiles.slice(0,8)" :key="f.name" class="dataset-chip">{{ f.name }}</span>
              <span v-if="uploadFiles.length > 8" class="dataset-chip">+{{ uploadFiles.length - 8 }} more</span>
            </div>
            <div class="btn-row" style="margin-top:0;">
              <button class="btn btn-primary" :disabled="uploading" @click="doUpload">{{ uploading ? 'Uploading...' : 'Upload ' + uploadFiles.length + ' file(s)' }}</button>
              <button class="btn btn-ghost" @click="uploadFiles=[]">Clear</button>
            </div>
          </div>
        </div>
      </template>

      <template v-if="tab === 'unet'">
        <div class="selection-panel">
          <div class="selection-label">Training datasets</div>
          <div class="selection-copy">{{ unet.uncoated ? 'Uncoated mode uses only checked *-uncoated folders.' : 'Standard mode uses only checked coated folders.' }}</div>
          <div class="dataset-chip-row" style="margin-top:10px;">
            <span v-for="ds in effectiveUnetDatasetCards" :key="ds.name" class="dataset-chip">{{ ds.name }}</span>
            <span v-if="effectiveUnetDatasetCards.length === 0" class="dataset-chip">No matching datasets selected</span>
          </div>
          <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-ghost" @click="tab='dataset'">Manage datasets</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Mode</div>
          <div class="toggle-row">
            <label class="toggle">
              <input type="checkbox" v-model="unet.uncoated" />
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
            <span class="toggle-label">Uncoated mode</span>
          </div>
          <div v-if="unet.uncoated" style="font-size:12px;color:var(--muted);margin-top:6px;line-height:1.6;">
            Uses patch-based training with leave-one-out cross validation on the reduced uncoated label set.
          </div>
        </div>

        <div class="card">
          <div class="card-title">{{ unet.uncoated ? 'Uncoated patch + CV settings' : 'Training hyperparameters' }}</div>
          <div v-if="!unet.uncoated" class="form-grid">
            <div class="form-group"><label class="form-label">Image size (px)</label><input v-model.number="unet.img_size" type="number" class="form-input" step="32" min="128" max="1024" /></div>
            <div class="form-group"><label class="form-label">Batch size</label><input v-model.number="unet.batch_size" type="number" class="form-input" min="1" max="32" /></div>
            <div class="form-group"><label class="form-label">Max epochs</label><input v-model.number="unet.epochs" type="number" class="form-input" min="1" max="2000" /></div>
            <div class="form-group"><label class="form-label">Early stopping patience</label><input v-model.number="unet.patience" type="number" class="form-input" min="1" max="500" /></div>
            <div class="form-group"><label class="form-label">Learning rate</label><input v-model="unet.learning_rate" type="text" class="form-input" placeholder="1e-3" /></div>
            <div class="form-group"><label class="form-label">Weight decay</label><input v-model="unet.weight_decay" type="text" class="form-input" placeholder="1e-4" /></div>
            <div class="form-group"><label class="form-label">Random seed</label><input v-model.number="unet.seed" type="number" class="form-input" /></div>
          </div>
          <div v-else class="form-grid">
            <div class="form-group"><label class="form-label">Patch size (px)</label><input v-model.number="unet.patch_size" type="number" class="form-input" step="32" min="128" max="1024" /></div>
            <div class="form-group"><label class="form-label">Patches per image</label><input v-model.number="unet.patches_per_image" type="number" class="form-input" min="1" max="512" /></div>
            <div class="form-group"><label class="form-label">Batch size</label><input v-model.number="unet.uncoated_batch_size" type="number" class="form-input" min="1" max="64" /></div>
            <div class="form-group"><label class="form-label">Epochs per fold</label><input v-model.number="unet.uncoated_epochs" type="number" class="form-input" min="1" max="2000" /></div>
            <div class="form-group"><label class="form-label">Patience per fold</label><input v-model.number="unet.uncoated_patience" type="number" class="form-input" min="1" max="500" /></div>
            <div class="form-group"><label class="form-label">Learning rate</label><input v-model="unet.uncoated_learning_rate" type="text" class="form-input" placeholder="1e-4" /></div>
            <div class="form-group"><label class="form-label">Weight decay</label><input v-model="unet.uncoated_weight_decay" type="text" class="form-input" placeholder="1e-4" /></div>
            <div class="form-group"><label class="form-label">Init checkpoint (optional)</label><input v-model="unet.uncoated_init_checkpoint" type="text" class="form-input" placeholder="D:\\path\\to\\TR3-29-2026.pth" /><span class="form-hint">Optional full path to a coated checkpoint for warm start.</span></div>
            <div class="form-group"><label class="form-label">Random seed</label><input v-model.number="unet.seed" type="number" class="form-input" /></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" :disabled="status.running || !effectiveUnetDatasetNames.length" @click="startUnet">Start training</button>
          <button class="btn btn-danger" :disabled="!status.running" @click="stopTraining">Stop</button>
          <span v-if="status.running" style="font-size:12px;color:var(--muted);font-family:var(--font-mono);">training in progress...</span>
        </div>
      </template>

      <template v-if="tab === 'regression'">
        <div class="selection-panel">
          <div class="selection-label">Regression source datasets</div>
          <div class="selection-copy">{{ reg.uncoated ? 'Uncoated regression uses only checked *-uncoated folders.' : 'Standard regression uses only checked coated folders.' }}</div>
          <div class="dataset-chip-row" style="margin-top:10px;">
            <span v-for="ds in effectiveRegressionDatasetCards" :key="ds.name" class="dataset-chip">{{ ds.name }}</span>
            <span v-if="effectiveRegressionDatasetCards.length === 0" class="dataset-chip">No matching datasets selected</span>
          </div>
          <div class="btn-row" style="margin-top:12px;">
            <button class="btn btn-ghost" @click="tab='dataset'">Manage datasets</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Model selection</div>
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">UNet checkpoint for regression</label>
              <select v-model="reg.checkpoint" class="form-select alt">
                <option value="">Auto (default checkpoint)</option>
                <option v-for="name in availableRegressionModels" :key="name" :value="name">{{ name }}</option>
              </select>
              <span class="form-hint">Used to generate segmentation features before fitting the regressor.</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Mode</div>
          <div class="toggle-row">
            <label class="toggle">
              <input type="checkbox" v-model="reg.uncoated" />
              <span class="toggle-track"></span>
              <span class="toggle-thumb"></span>
            </label>
            <span class="toggle-label">Uncoated dataset / checkpoint</span>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Regressor settings</div>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Polynomial degree</label><select v-model.number="reg.degree" class="form-select alt"><option :value="1">1 - Linear</option><option :value="2">2 - Quadratic</option><option :value="3">3 - Cubic</option></select></div>
            <div class="form-group"><label class="form-label">Ridge alpha</label><input v-model="reg.alpha" type="text" class="form-input alt" placeholder="1.0" /><span class="form-hint">Regularization strength (ignored if no-ridge).</span></div>
            <div class="form-group"><label class="form-label">Validation split</label><input v-model.number="reg.test_size" type="number" class="form-input alt" step="0.05" min="0.05" max="0.5" /><span class="form-hint">Fraction of data held out for validation.</span></div>
            <div class="form-group"><label class="form-label">Image size (px)</label><input v-model.number="reg.img_size" type="number" class="form-input alt" step="32" min="128" max="1024" /><span class="form-hint">Should match UNet training image size.</span></div>
            <div class="form-group"><label class="form-label">Max images (optional)</label><input v-model="reg.max_images_str" type="text" class="form-input alt" placeholder="all" /><span class="form-hint">Leave blank to use all images.</span></div>
            <div class="form-group"><label class="form-label">Random seed</label><input v-model.number="reg.seed" type="number" class="form-input alt" /></div>
          </div>

          <div class="section-divider"></div>
          <div style="display:flex;gap:24px;flex-wrap:wrap;">
            <div class="toggle-row"><label class="toggle"><input type="checkbox" v-model="reg.no_ridge" /><span class="toggle-track"></span><span class="toggle-thumb"></span></label><span class="toggle-label">No Ridge (plain LinearRegression)</span></div>
            <div class="toggle-row"><label class="toggle"><input type="checkbox" v-model="reg.no_scaling" /><span class="toggle-track"></span><span class="toggle-thumb"></span></label><span class="toggle-label">No feature scaling</span></div>
            <div class="toggle-row"><label class="toggle"><input type="checkbox" v-model="reg.cpu" /><span class="toggle-track"></span><span class="toggle-thumb"></span></label><span class="toggle-label">Force CPU inference</span></div>
          </div>
        </div>

        <div class="btn-row">
          <button class="btn btn-secondary" :disabled="status.running || !effectiveRegressionDatasetNames.length" @click="startRegression">Train regression</button>
          <button class="btn btn-danger" :disabled="!status.running" @click="stopTraining">Stop</button>
          <span v-if="status.running && status.mode === 'regression'" style="font-size:12px;color:var(--navy);font-family:var(--font-mono);">regression training...</span>
        </div>
      </template>

      <template v-if="tab === 'progress'">
        <div class="progress-summary">
          <div class="progress-pill"><div class="progress-pill-label">Mode</div><div class="progress-pill-value">{{ progressModeLabel }}</div></div>
          <div class="progress-pill"><div class="progress-pill-label">Epoch</div><div class="progress-pill-value">{{ latestMetric ? latestMetric.epoch + ' / ' + latestMetric.max_epoch : (status.running ? 'waiting...' : '--') }}</div></div>
          <div class="progress-pill"><div class="progress-pill-label">Fold</div><div class="progress-pill-value">{{ status.fold && status.total_folds ? status.fold + ' / ' + status.total_folds : '--' }}</div></div>
          <div class="progress-pill"><div class="progress-pill-label">Batch</div><div class="progress-pill-value">{{ progressBatchLabel }}</div></div>
          <div class="progress-pill"><div class="progress-pill-label">Datasets</div><div class="progress-pill-value">{{ activeProgressDatasets.length }}</div></div>
        </div>

        <div v-if="activeProgressDatasets.length" class="selection-panel">
          <div class="selection-label">Current selection</div>
          <div class="dataset-chip-row" style="margin-top:10px;">
            <span v-for="name in activeProgressDatasets" :key="name" class="dataset-chip">{{ name }}</span>
          </div>
        </div>

        <div v-if="latestMetric" class="metric-badges">
          <span class="metric-badge train-loss">train loss {{ latestMetric.train_loss.toFixed(4) }}</span>
          <span class="metric-badge val-loss">val loss {{ latestMetric.val_loss.toFixed(4) }}</span>
          <span class="metric-badge train-dice">train dice {{ latestMetric.train_dice.toFixed(4) }}</span>
          <span class="metric-badge val-dice">val dice {{ latestMetric.val_dice.toFixed(4) }}</span>
        </div>

        <div class="chart-grid">
          <div class="chart-wrap">
            <div class="chart-title">Loss over epochs</div>
            <div v-if="status.metrics.length === 0" class="chart-empty">{{ status.running ? 'Waiting for the first epoch to finish...' : 'No data yet - start training to see metrics.' }}</div>
            <canvas v-else id="chart-loss"></canvas>
          </div>
          <div class="chart-wrap">
            <div class="chart-title">Dice score over epochs</div>
            <div v-if="status.metrics.length === 0" class="chart-empty">{{ status.running ? 'Metrics will appear after epoch 1 completes.' : 'No data yet.' }}</div>
            <canvas v-else id="chart-dice"></canvas>
          </div>
        </div>

        <div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div class="card-title" style="margin-bottom:0;">Training log</div>
            <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px;" @click="clearMetrics">Clear</button>
          </div>
          <div class="log-box" ref="logBox">
            <div v-if="displayLog.length === 0" style="color:var(--muted);">{{ status.running ? 'Process started. Waiting for log output...' : 'Waiting for output...' }}</div>
            <div v-for="(line, i) in displayLog" :key="i" class="log-line" :class="logClass(line)">{{ line }}</div>
          </div>
        </div>

        <div v-if="status.completed && !status.running" style="padding:12px 16px;border-radius:var(--radius);background:rgba(34,197,94,.12);color:var(--green);font-family:var(--font-mono);font-size:13px;margin-top:4px;">Training completed successfully</div>
        <div v-if="status.error" style="padding:12px 16px;border-radius:var(--radius);background:rgba(239,68,68,.12);color:var(--red);font-family:var(--font-mono);font-size:13px;margin-top:4px;">{{ status.error }}</div>
      </template>
    </div>
  </main>

  <div class="toast-container">
    <div v-for="t in toasts" :key="t.id" class="toast" :class="t.type">{{ t.msg }}</div>
  </div>
</div>
<script>
const { createApp, ref, shallowRef, computed, watch, onMounted, nextTick } = Vue;

const API = window.location.origin;
const DATASET_SELECTION_KEY = "soil-segment-training.selected-datasets";

createApp({
  setup() {
    const tab = ref("dataset");
    const dragging = ref(false);
    const uploading = ref(false);
    const uploadFiles = ref([]);
    const dsInfo = ref(null);
    const toasts = ref([]);
    const logBox = ref(null);
    const useCustomDataset = ref(false);
    const selectedDatasets = ref([]);

    const lossChart = shallowRef(null);
    const diceChart = shallowRef(null);

    const status = ref({
      running: false,
      mode: null,
      fold: null,
      total_folds: null,
      phase: null,
      batch: null,
      total_batches: null,
      metrics: [],
      log: [],
      completed: false,
      error: null,
      selected_datasets: [],
    });

    const unet = ref({
      uncoated: false,
      seed: 42,
      img_size: 512,
      batch_size: 4,
      epochs: 300,
      patience: 50,
      learning_rate: "1e-3",
      weight_decay: "1e-4",
      patch_size: 512,
      patches_per_image: 32,
      uncoated_batch_size: 4,
      uncoated_epochs: 160,
      uncoated_patience: 30,
      uncoated_learning_rate: "1e-4",
      uncoated_weight_decay: "1e-4",
      uncoated_init_checkpoint: "",
    });

    const reg = ref({
      checkpoint: "",
      uncoated: false,
      img_size: 512,
      degree: 1,
      alpha: "1.0",
      no_ridge: false,
      no_scaling: false,
      test_size: 0.2,
      seed: 42,
      max_images_str: "",
      cpu: false,
    });

    const uploadForm = ref({
      dataset_type: "unet",
      file_role: "images",
      existing_dataset_name: "",
      custom_dataset_name: "",
    });

    const serverUrl = ref(API);
    let pollTimer = null;
    let prevMetricLen = 0;

    const tabTitle = computed(() => ({
      dataset: "Dataset overview",
      upload: "Upload files",
      unet: "UNet training",
      regression: "Regression training",
      progress: "Training progress",
    }[tab.value] || ""));

    const tabSub = computed(() => ({
      dataset: "view formula datasets and choose what UNet trains on",
      upload: "send files into an existing or new dataset folder",
      unet: "configure and launch segmentation training",
      regression: "train the NPK regressor from UNet outputs",
      progress: "compact metrics and recent log output",
    }[tab.value] || ""));

    const isRegressionUpload = computed(() => uploadForm.value.dataset_type === "regression");
    const availableDatasets = computed(() => dsInfo.value?.datasets ?? []);
    const trainableDatasets = computed(() => availableDatasets.value.filter((dataset) => dataset.trainable));
    const availableUploadDatasetNames = computed(() => {
      const unetNames = availableDatasets.value.map((dataset) => dataset.name);
      if (!isRegressionUpload.value) return unetNames;

      const regressionNames = (dsInfo.value?.regression_datasets ?? []).map((dataset) => dataset.name);
      return [...new Set([...unetNames, ...regressionNames])].sort((a, b) => a.localeCompare(b));
    });
    const availableRegressionModels = computed(() =>
      (dsInfo.value?.checkpoints?.files ?? []).filter((name) =>
        name.toLowerCase().endsWith(".pth") &&
        !/^best_model(?:_uncoated)?\.pth$/i.test(name)
      )
    );
    const selectedDatasetCards = computed(() =>
      selectedDatasets.value
        .map((name) => availableDatasets.value.find((dataset) => dataset.name === name))
        .filter(Boolean)
    );
    function filterModeDatasetNames(names, useUncoated) {
      const datasetMap = new Map(availableDatasets.value.map((dataset) => [dataset.name, dataset]));
      return (names || []).filter((name) => {
        const dataset = datasetMap.get(name);
        return dataset && Boolean(dataset.uncoated) === Boolean(useUncoated);
      });
    }
    const effectiveUnetDatasetNames = computed(() => filterModeDatasetNames(selectedDatasets.value, unet.value.uncoated));
    const effectiveRegressionDatasetNames = computed(() => filterModeDatasetNames(selectedDatasets.value, reg.value.uncoated));
    const effectiveUnetDatasetCards = computed(() =>
      effectiveUnetDatasetNames.value
        .map((name) => availableDatasets.value.find((dataset) => dataset.name === name))
        .filter(Boolean)
    );
    const effectiveRegressionDatasetCards = computed(() =>
      effectiveRegressionDatasetNames.value
        .map((name) => availableDatasets.value.find((dataset) => dataset.name === name))
        .filter(Boolean)
    );
    const uploadAccept = computed(() => {
      if (isRegressionUpload.value) return ".zip,.jpg,.jpeg,.png,.bmp,.tif,.tiff";
      return uploadForm.value.file_role === "masks"
        ? ".zip,.png,.jpg,.jpeg"
        : ".zip,.jpg,.jpeg,.png,.bmp,.tif,.tiff";
    });
    const latestMetric = computed(() => {
      const metrics = status.value.metrics;
      return metrics.length ? metrics[metrics.length - 1] : null;
    });
    const displayLog = computed(() => status.value.log.slice(-80));
    const activeProgressDatasets = computed(() => {
      if (status.value.selected_datasets && status.value.selected_datasets.length) {
        return status.value.selected_datasets;
      }
      if (tab.value === "unet") return effectiveUnetDatasetNames.value;
      if (tab.value === "regression") return effectiveRegressionDatasetNames.value;
      return status.value.running || status.value.completed ? [] : selectedDatasets.value;
    });
    const progressModeLabel = computed(() => {
      if (status.value.mode === "unet_uncoated") return "UNet LOO-CV";
      if (status.value.mode === "unet") return "UNet";
      if (status.value.mode === "regression") return "Regression";
      return status.value.running ? "Running" : "Idle";
    });
    const progressBatchLabel = computed(() => {
      if (!status.value.batch || !status.value.total_batches) {
        return status.value.running ? "waiting..." : "--";
      }
      const phase = status.value.phase ? status.value.phase.toUpperCase() + " " : "";
      return `${phase}${status.value.batch} / ${status.value.total_batches}`;
    });

    async function api(method, path, body) {
      const options = { method, headers: { "Content-Type": "application/json" } };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(API + path, options);
      if (!response.ok) {
        const error = await response.json().catch(() => ({ detail: response.statusText }));
        throw new Error(error.detail || response.statusText);
      }
      return response.json();
    }

    function toast(msg, type = "info", ms = 3500) {
      const id = Date.now() + Math.random();
      toasts.value.push({ id, msg, type });
      setTimeout(() => {
        toasts.value = toasts.value.filter((item) => item.id !== id);
      }, ms);
    }

    function normalizeSelectedDatasets(names) {
      const allowed = new Set(trainableDatasets.value.map((dataset) => dataset.name));
      return [...new Set((names || []).filter((name) => allowed.has(name)))];
    }

    function persistSelectedDatasets() {
      try {
        localStorage.setItem(DATASET_SELECTION_KEY, JSON.stringify(selectedDatasets.value));
      } catch (_) {}
    }

    function hydrateSelectedDatasets() {
      let stored = [];
      try {
        stored = JSON.parse(localStorage.getItem(DATASET_SELECTION_KEY) || "[]");
      } catch (_) {
        stored = [];
      }
      const normalized = normalizeSelectedDatasets(stored);
      selectedDatasets.value = normalized.length
        ? normalized
        : trainableDatasets.value.map((dataset) => dataset.name);
    }

    function selectAllDatasets() {
      selectedDatasets.value = trainableDatasets.value.map((dataset) => dataset.name);
    }

    function selectCoatedDatasets() {
      selectedDatasets.value = trainableDatasets.value
        .filter((dataset) => !dataset.uncoated)
        .map((dataset) => dataset.name);
    }

    function selectUncoatedDatasets() {
      selectedDatasets.value = trainableDatasets.value
        .filter((dataset) => dataset.uncoated)
        .map((dataset) => dataset.name);
    }

    function clearDatasetSelection() {
      selectedDatasets.value = [];
    }

    function useExistingDataset() {
      useCustomDataset.value = false;
      if (!uploadForm.value.existing_dataset_name && availableUploadDatasetNames.value.length) {
        uploadForm.value.existing_dataset_name = availableUploadDatasetNames.value[0];
      }
    }

    function enterCustomDataset() {
      useCustomDataset.value = true;
      if (!uploadForm.value.custom_dataset_name) {
        uploadForm.value.custom_dataset_name = uploadForm.value.existing_dataset_name || "";
      }
    }

    async function loadDatasetInfo() {
      try {
        dsInfo.value = await api("GET", "/api/dataset/info");
        if (!uploadForm.value.existing_dataset_name && availableUploadDatasetNames.value.length) {
          uploadForm.value.existing_dataset_name = availableUploadDatasetNames.value[0];
        } else if (
          uploadForm.value.existing_dataset_name &&
          !availableUploadDatasetNames.value.includes(uploadForm.value.existing_dataset_name)
        ) {
          uploadForm.value.existing_dataset_name = availableUploadDatasetNames.value[0] || "";
        }
        hydrateSelectedDatasets();
      } catch (error) {
        toast("Could not load dataset info: " + error.message, "error");
      }
    }

    function onFileSelect(event) {
      uploadFiles.value = Array.from(event.target.files);
    }

    function onDrop(event) {
      dragging.value = false;
      uploadFiles.value = Array.from(event.dataTransfer.files);
    }

    async function doUpload() {
      if (!uploadFiles.value.length) return;
      const datasetName = (useCustomDataset.value ? uploadForm.value.custom_dataset_name : uploadForm.value.existing_dataset_name).trim();
      if (!datasetName) {
        toast("Choose or type a dataset name before uploading.", "error");
        return;
      }

      uploading.value = true;
      try {
        const formData = new FormData();
        uploadFiles.value.forEach((file) => formData.append("files", file));
        formData.append("dataset_type", uploadForm.value.dataset_type);
        formData.append("dataset_name", datasetName);
        formData.append("file_role", isRegressionUpload.value ? "images" : uploadForm.value.file_role);

        const response = await fetch(API + "/api/dataset/upload", { method: "POST", body: formData });
        if (!response.ok) throw new Error((await response.json()).detail);
        const result = await response.json();
        toast(`Uploaded ${result.saved.length} file(s) to ${result.dataset}`, "success");
        uploadFiles.value = [];
        uploadForm.value.existing_dataset_name = datasetName;
        await loadDatasetInfo();
      } catch (error) {
        toast("Upload failed: " + error.message, "error");
      } finally {
        uploading.value = false;
      }
    }

    function parseFloatValue(value) {
      const parsed = parseFloat(value);
      return Number.isNaN(parsed) ? value : parsed;
    }

    async function startUnet() {
      if (!effectiveUnetDatasetNames.value.length) {
        toast(unet.value.uncoated ? "Select at least one uncoated dataset in the Dataset tab." : "Select at least one coated dataset in the Dataset tab.", "error");
        return;
      }

      try {
        const payload = {
          ...unet.value,
          datasets: [...effectiveUnetDatasetNames.value],
          learning_rate: parseFloatValue(unet.value.learning_rate),
          weight_decay: parseFloatValue(unet.value.weight_decay),
          uncoated_learning_rate: parseFloatValue(unet.value.uncoated_learning_rate),
          uncoated_weight_decay: parseFloatValue(unet.value.uncoated_weight_decay),
          uncoated_init_checkpoint: unet.value.uncoated_init_checkpoint.trim() || null,
        };
        await api("POST", "/api/train/unet/start", payload);
        toast("UNet training started", "success");
        tab.value = "progress";
        startPolling();
      } catch (error) {
        toast(error.message, "error");
      }
    }

    async function startRegression() {
      if (!effectiveRegressionDatasetNames.value.length) {
        toast(reg.value.uncoated ? "Select at least one uncoated dataset in the Dataset tab." : "Select at least one coated dataset in the Dataset tab.", "error");
        return;
      }

      try {
        const payload = {
          ...reg.value,
          checkpoint: reg.value.checkpoint || null,
          datasets: [...effectiveRegressionDatasetNames.value],
          alpha: parseFloatValue(reg.value.alpha),
          max_images: reg.value.max_images_str ? parseInt(reg.value.max_images_str, 10) : null,
        };
        delete payload.max_images_str;
        await api("POST", "/api/train/regression/start", payload);
        toast("Regression training started", "success");
        tab.value = "progress";
        startPolling();
      } catch (error) {
        toast(error.message, "error");
      }
    }

    async function stopTraining() {
      try {
        await api("POST", "/api/train/stop");
        toast("Training stopped", "info");
        stopPolling();
      } catch (error) {
        toast(error.message, "error");
      }
    }

    async function clearMetrics() {
      await api("DELETE", "/api/train/clear").catch(() => {});
      prevMetricLen = 0;
      status.value.metrics = [];
      status.value.log = [];
      status.value.phase = null;
      status.value.batch = null;
      status.value.total_batches = null;
      status.value.error = null;
      status.value.completed = false;
      status.value.selected_datasets = [];
      destroyCharts();
    }

    async function pollStatus() {
      try {
        const nextStatus = await api("GET", "/api/train/status");
        status.value = nextStatus;
        if (!nextStatus.running) stopPolling();

        if (nextStatus.metrics.length !== prevMetricLen) {
          prevMetricLen = nextStatus.metrics.length;
          await nextTick();
          updateCharts(nextStatus.metrics);
        }

        await nextTick();
        if (logBox.value) {
          logBox.value.scrollTop = logBox.value.scrollHeight;
        }
      } catch (_) {}
    }

    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(pollStatus, 1800);
    }

    function stopPolling() {
      clearInterval(pollTimer);
      pollTimer = null;
    }

    function destroyCharts() {
      if (lossChart.value) {
        lossChart.value.destroy();
        lossChart.value = null;
      }
      if (diceChart.value) {
        diceChart.value.destroy();
        diceChart.value = null;
      }
    }

    const chartDefaults = {
      responsive: true,
      maintainAspectRatio: true,
      animation: false,
      plugins: {
        legend: {
          labels: {
            color: "#5f6d82",
            font: { family: "SFMono-Regular, Consolas, monospace", size: 11 },
            boxWidth: 14,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: "#8b97a9", font: { family: "SFMono-Regular, Consolas, monospace", size: 10 } },
          grid: { color: "rgba(42, 77, 115, 0.08)" },
        },
        y: {
          ticks: { color: "#8b97a9", font: { family: "SFMono-Regular, Consolas, monospace", size: 10 } },
          grid: { color: "rgba(42, 77, 115, 0.08)" },
        },
      },
    };

    function metricSeries(metrics, key) {
      return metrics.map((metric) => {
        const value = Number(metric[key]);
        return Number.isFinite(value) ? value : null;
      });
    }

    function updateCharts(metrics) {
      if (!metrics.length) return;

      const labels = metrics.map((metric) => (metric.fold ? `F${metric.fold}:${metric.epoch}` : `${metric.epoch}`));
      const trainLoss = metricSeries(metrics, "train_loss");
      const valLoss = metricSeries(metrics, "val_loss");
      const trainDice = metricSeries(metrics, "train_dice");
      const valDice = metricSeries(metrics, "val_dice");

      const lossElement = document.getElementById("chart-loss");
      const diceElement = document.getElementById("chart-dice");
      if (!lossElement || !diceElement) return;

      if (lossChart.value && lossChart.value.canvas !== lossElement) {
        lossChart.value.destroy();
        lossChart.value = null;
      }
      if (diceChart.value && diceChart.value.canvas !== diceElement) {
        diceChart.value.destroy();
        diceChart.value = null;
      }

      const lossData = {
        labels,
        datasets: [
          { label: "train loss", data: trainLoss, borderColor: "#2a4d73", backgroundColor: "rgba(42, 77, 115, 0.08)", borderWidth: 1.6, pointRadius: 0, tension: 0.28, fill: true },
          { label: "val loss", data: valLoss, borderColor: "#ef4444", backgroundColor: "rgba(239, 68, 68, 0.08)", borderWidth: 1.6, pointRadius: 0, tension: 0.28, fill: true },
        ],
      };
      const diceData = {
        labels,
        datasets: [
          { label: "train dice", data: trainDice, borderColor: "#22c55e", backgroundColor: "rgba(34, 197, 94, 0.08)", borderWidth: 1.6, pointRadius: 0, tension: 0.28, fill: true },
          { label: "val dice", data: valDice, borderColor: "#f28c28", backgroundColor: "rgba(242, 140, 40, 0.08)", borderWidth: 1.6, pointRadius: 0, tension: 0.28, fill: true },
        ],
      };

      if (!lossChart.value) {
        lossChart.value = new Chart(lossElement, { type: "line", data: lossData, options: { ...chartDefaults } });
      } else {
        lossChart.value.data.labels = labels;
        lossChart.value.data.datasets[0].data = trainLoss;
        lossChart.value.data.datasets[1].data = valLoss;
        lossChart.value.update();
      }

      if (!diceChart.value) {
        diceChart.value = new Chart(diceElement, { type: "line", data: diceData, options: { ...chartDefaults } });
      } else {
        diceChart.value.data.labels = labels;
        diceChart.value.data.datasets[0].data = trainDice;
        diceChart.value.data.datasets[1].data = valDice;
        diceChart.value.update();
      }
    }

    function logClass(line) {
      if (line.startsWith("[DATASET]")) return "meta";
      if (line.includes("[BEST]") || line.includes("[OK]") || line.includes("Training complete")) return "done";
      if (line.includes("[WARN]") || line.includes("Warning")) return "warn";
      if (line.includes("Traceback") || line.includes("Error") || line.includes("[ERROR]") || line.includes("error")) return "err";
      if (/^Fold\s+\d+/.test(line)) return "fold";
      return "";
    }

    watch(selectedDatasets, () => {
      persistSelectedDatasets();
    }, { deep: true });

    watch(() => uploadForm.value.dataset_type, (value) => {
      if (value === "regression") {
        uploadForm.value.file_role = "images";
      }
      if (!useCustomDataset.value) {
        if (!uploadForm.value.existing_dataset_name && availableUploadDatasetNames.value.length) {
          uploadForm.value.existing_dataset_name = availableUploadDatasetNames.value[0];
        } else if (
          uploadForm.value.existing_dataset_name &&
          !availableUploadDatasetNames.value.includes(uploadForm.value.existing_dataset_name)
        ) {
          uploadForm.value.existing_dataset_name = availableUploadDatasetNames.value[0] || "";
        }
      }
    });

    watch(tab, async (nextTab) => {
      if (nextTab !== "progress") {
        destroyCharts();
        return;
      }
      if (status.value.metrics.length) {
        await nextTick();
        updateCharts(status.value.metrics);
      }
    });

    onMounted(async () => {
      await loadDatasetInfo();
      await pollStatus();
      if (status.value.running) startPolling();
    });

    return {
      tab, dragging, uploading, uploadFiles, uploadForm, dsInfo, toasts, logBox, useCustomDataset, selectedDatasets,
      status, unet, reg, serverUrl, tabTitle, tabSub, isRegressionUpload, availableDatasets, availableUploadDatasetNames,
      availableRegressionModels,
      selectedDatasetCards, effectiveUnetDatasetNames, effectiveRegressionDatasetNames, effectiveUnetDatasetCards,
      effectiveRegressionDatasetCards, uploadAccept, latestMetric, displayLog, activeProgressDatasets, progressModeLabel, progressBatchLabel,
      loadDatasetInfo, onFileSelect, onDrop, doUpload, startUnet, startRegression, stopTraining, clearMetrics,
      selectAllDatasets, selectCoatedDatasets, selectUncoatedDatasets, clearDatasetSelection, useExistingDataset,
      enterCustomDataset, logClass,
    };
  },
}).mount("#app");
</script>
</body>
</html>
